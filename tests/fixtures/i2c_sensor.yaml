# Minimal I2C device test fixture: a simple temperature sensor
block/SENSOR:
  description: I2C temperature sensor.
  items:
    - name: TEMP
      description: Temperature data register.
      byte_offset: 0x00
      fieldset: TEMP
      access: Read
    - name: CONFIG
      description: Configuration register.
      byte_offset: 0x01
      fieldset: CONFIG
    - name: THYST
      description: Hysteresis temperature threshold.
      byte_offset: 0x02
      bit_size: 16
    - name: TOS
      description: Over-temperature shutdown threshold.
      byte_offset: 0x03
      bit_size: 16
    - name: ID
      description: Device ID registers.
      byte_offset: 0x10
      bit_size: 8
      access: Read
      array:
        len: 4
        stride: 1
fieldset/TEMP:
  description: Temperature Data Register.
  fields:
    - name: TEMP
      description: Temperature value (in 0.0625C steps).
      bit_offset: 4
      bit_size: 12
fieldset/CONFIG:
  description: Sensor Configuration Register.
  fields:
    - name: SD
      description: Shutdown mode.
      bit_offset: 0
      bit_size: 1
    - name: TM
      description: Thermostat mode.
      bit_offset: 1
      bit_size: 1
    - name: RES
      description: ADC resolution.
      bit_offset: 5
      bit_size: 2
      enum: RESOLUTION
enum/RESOLUTION:
  bit_size: 2
  variants:
    - name: BITS_9
      description: 9-bit resolution.
      value: 0
    - name: BITS_10
      description: 10-bit resolution.
      value: 1
    - name: BITS_11
      description: 11-bit resolution.
      value: 2
    - name: BITS_12
      description: 12-bit resolution.
      value: 3
